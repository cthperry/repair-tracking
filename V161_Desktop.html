<html lang="zh-Hant">
<head>

  <title>維修追蹤系統 - Desktop</title>

  <!-- ========================================
       ${AppConfig.getFullVersion()}
       這是一個全新的模組化架構
       核心理念：穩定性、可維護性、效能
       ======================================== -->

  <!-- Shared CSS Variables -->
  <link rel="stylesheet" href="core/variables.css">
  <!-- Shared Base Styles & Components -->
  <link rel="stylesheet" href="core/shared.css">
  <!-- Core UI Components (buttons, inputs, cards, stats, etc.) -->
  <link rel="stylesheet" href="core/ui.css">
  <!-- Corporate UI Enhancement (sidebar dark theme, typography, component polish) V161.276 -->
  <link rel="stylesheet" href="core/corporate-enhancement.css">

  <style>
    /* Desktop specific background gradient */
    body {
      background:
        radial-gradient(1200px 600px at 0% 0%, var(--module-accent-soft), transparent 55%),
        radial-gradient(900px 520px at 100% 0%, rgba(14, 165, 233, 0.06), transparent 60%),
        linear-gradient(180deg, var(--color-background) 0%, var(--color-surface-muted) 100%);
      background-attachment: fixed;
    }

    /* ========================================
       Loading Screen (由 Bootstrap 渲染)
       ======================================== */
    /* Bootstrap 會動態插入載入畫面 */
    
    /* ========================================
       Login Screen (由 Auth 渲染)
       ======================================== */
    /* Auth 會動態插入登入表單 */
    
    /* ========================================
       Main App Layout (登入後顯示)
       ======================================== */
    .app {
      display: flex;
      min-height: 100vh;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
    }
    
    aside {
      width: 252px;
      background: linear-gradient(180deg, var(--sidebar-bg) 0%, var(--sidebar-bg-alt) 100%);
      border-right: 1px solid rgba(0,0,0,0.18);
      color: var(--sidebar-text);
      padding: 14px 10px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.10);
      /* 無 backdrop-filter：深色固態更有重量感 */
    }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      height: var(--header-height, 52px);
      border-bottom: 1px solid var(--color-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.99) 0%, rgba(247,249,253,0.99) 100%);
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 1px 0 var(--color-border), 0 2px 8px rgba(15,23,42,0.04);
    }

    /* Header, brand, and user components now in core/shared.css */

    .sidebar-header{padding: 10px 10px 0 10px;}
    .sidebar-title{font-weight:900;font-size:14px;color:var(--color-text);}
    .sidebar-sub{margin-top:4px;}

    .sidebar-nav{padding: 0 10px; flex: 1; overflow-y: auto;}

    .sidebar-footer{padding: 0 10px 10px 10px;}

    /* Buttons, inputs, and utility classes now in core/shared.css */

    /* ========================================
       Navigation（覆寫由 corporate-enhancement.css 統一處理）
       ======================================== */
    .nav-title { color: var(--sidebar-text-muted); font-size: 10.5px; letter-spacing:0.10em; text-transform: uppercase; font-weight:900; padding: 10px 4px 4px 4px; margin-bottom: 0; }
    .nav-item { padding:9px 10px; border-radius:8px; margin-bottom:2px; cursor:pointer; display:flex; align-items:center; gap:8px; color:var(--sidebar-text); border:1px solid transparent; user-select:none; font-size:13px; font-weight:500; transition: background .14s ease, color .14s ease; }
    .nav-item:hover { background:var(--sidebar-item-hover); color:var(--sidebar-text-hover); border-color: transparent; }
    .nav-item.active { background:var(--sidebar-item-active); border-left:3px solid var(--module-accent); padding-left:7px; color:var(--sidebar-text-active); font-weight:700; }
    .nav-item.disabled { cursor:not-allowed; opacity:.55; }
    .nav-item.disabled:hover { background:transparent; color:var(--sidebar-text-muted); }

    /* Message states and spacer now in core/shared.css */

    .main-content{flex:1;overflow-y:auto;}
  </style>
</head>
